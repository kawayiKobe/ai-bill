services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-bill-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_bill
      POSTGRES_USER: ai_bill_user
      POSTGRES_PASSWORD: ai_bill_pass
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
